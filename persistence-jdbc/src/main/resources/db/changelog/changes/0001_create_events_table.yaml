databaseChangeLog:
  - changeSet:
      id: 0001
      author: Daniel Götten
      changes:
        - createTable:
            tableName: events
            columns:
              - column:
                  name: ordering
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_events
              - column:
                  name: partition_key
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: timestamp
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: BYTEA
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_events_partition_key
            tableName: events
            columns:
              - column:
                  name: partition_key
