databaseChangeLog:
  - changeSet:
      id: 0001
      author: Daniel Götten
      changes:
        - createTable:
            tableName: events
            columns:
              - column:
                  name: partition_key
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: ordering
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: timestamp
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: BYTEA
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: events
            columnNames: partition_key, ordering
            constraintName: pk_events
        - createTable:
            tableName: snapshots
            columns:
              - column:
                  name: partition_key
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: ordering
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: event_ordering
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: timestamp
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: BYTEA
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: snapshots
            columnNames: partition_key, ordering
            constraintName: pk_snapshots
