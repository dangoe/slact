databaseChangeLog:
  - changeSet:
      id: 0001
      author: Daniel Götten
      changes:
        - createTable:
            tableName: events
            columns:
              - column:
                  name: partition_key
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: ordering
                  type: BIGINT
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_events
              - column:
                  name: timestamp
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: snapshot
                  type: BYTEA
                  constraints:
                    nullable: false
              - column:
                  name: is_snapshot_marker
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_events_partition_key
            tableName: events
            columns:
              - column:
                  name: partition_key
        - createTable:
            tableName: snapshots
            columns:
              - column:
                  name: partition_key
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: ordering
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: event_ordering
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: timestamp
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: snapshot
                  type: BYTEA
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: snapshots
            columnNames: partition_key, ordering
            constraintName: pk_snapshots
        - createIndex:
            indexName: idx_snapshots_partition_key
            tableName: snapshots
            columns:
              - column:
                  name: partition_key
